{% extends "base.html" %}

{% block title %}Waiting for Host... - Quiz Platform{% endblock %}

{% block content %}
<div class="flex flex-col items-center justify-center mt-20 mb-32 text-center relative z-0 px-4">
    <div class="bg-neo-green neo-card p-12 max-w-2xl w-full">
        <h2 class="text-4xl md:text-6xl font-black mb-6 animate-pulse">Waiting for Host...</h2>

        <p class="text-xl font-semibold mb-8 text-black">
            You're in! Get ready to play. The host will start the game shortly.
        </p>

        <div class="bg-white border-4 border-black p-6 mb-10 shadow-neo transform rotate-2">
            <div class="text-gray-500 font-bold mb-1">Your Nickname:</div>
            <div class="text-4xl font-black text-neo-blue">{{ nickname }}</div>
        </div>

        <div class="bg-white border-4 border-black p-6 mb-10 shadow-neo transform -rotate-1" id="connection-status">
            <div class="text-gray-500 font-bold mb-1">Status:</div>
            <div class="text-lg font-black text-neo-pink" id="status-text">Connecting to Live Server...</div>
        </div>

        <div class="flex flex-col sm:flex-row justify-center gap-4">
            <a href="{{ url_for('index') }}"
                class="neo-btn bg-black text-white px-8 py-4 text-xl hover:bg-gray-800 tracking-wide">
                Leave Game 🚪
            </a>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", function () {
        const socket = io();
        const sessionCode = "{{ session.session_code }}";
        const nickname = "{{ nickname }}";
        const statusText = document.getElementById("status-text");

        socket.on('connect', function () {
            statusText.innerText = "Connected! Waiting for host to start...";
            statusText.classList.replace("text-neo-pink", "text-neo-blue");

            socket.emit('join_room_event', {
                session_code: sessionCode,
                nickname: nickname
            });
        });

        socket.on('disconnect', function () {
            statusText.innerText = "Disconnected. Trying to reconnect...";
            statusText.classList.replace("text-neo-blue", "text-neo-red");
        });

        // Listen for session cancellation
        socket.on('session_cancelled', function () {
            statusText.innerText = "Session Cancelled by Host.";
            statusText.classList.remove("text-neo-blue", "text-neo-pink");
            statusText.classList.add("text-neo-red", "animate-bounce");

            setTimeout(() => {
                window.location.href = "{{ url_for('index') }}";
            }, 2000);
        });

        // Listen for game_start event — redirect to player game screen
        socket.on('game_started', function (data) {
            statusText.innerText = "Game is starting!";
            statusText.classList.remove("text-neo-blue", "text-neo-pink");
            statusText.classList.add("text-neo-green");
            // Redirect to the live game page after a brief delay
            setTimeout(() => {
                window.location.href = data.redirect_url || `/play/${sessionCode}`;
            }, 1000);
        });
    });
</script>
{% endblock %}
