{% extends "base.html" %}

{% block title %}Add Question - {{ quiz.title }}{% endblock %}

{% block content %}
<div class="flex justify-center mt-8 mb-20 relative z-0">
    <div class="w-full max-w-2xl">
        <div class="bg-white border-4 border-black shadow-neo rounded-lg relative">
            <div class="bg-neo-green border-b-4 border-black p-6 pl-24 md:pl-28 text-left">
                <a href="{{ url_for('edit_quiz', quiz_id=quiz.quiz_id) }}"
                    class="absolute top-6 left-4 font-bold text-sm bg-white border-2 border-black rounded px-2 py-1 shadow-neo-sm hover:-translate-y-0.5 hover:shadow-[3px_3px_0_0_#000] transition-all">←
                    Back</a>
                <h4 class="text-2xl font-black mb-1">➕ Add Question to "{{ quiz.title }}"</h4>
            </div>
            <div class="p-8">
                <form method="POST" action="{{ url_for('add_question', quiz_id=quiz.quiz_id) }}"
                    class="flex flex-col gap-6">
                    <!-- Question Type -->
                    <div>
                        <label for="question_type" class="block font-bold mb-2">Question Type <span
                                class="text-red-600">*</span></label>
                        <select class="neo-input bg-white cursor-pointer" id="question_type" name="question_type"
                            onchange="toggleOptions()">
                            <option value="multiple_choice">Multiple Choice</option>
                            <option value="true_false">True / False</option>
                            <option value="fill_blank">Fill in the Blank</option>
                        </select>
                    </div>

                    <!-- Question Text -->
                    <div>
                        <label for="question_text" class="block font-bold mb-2">Question Text <span
                                class="text-red-600">*</span></label>
                        <textarea class="neo-input bg-white" id="question_text" name="question_text" rows="3" required
                            placeholder="Enter your question"></textarea>
                    </div>

                    <!-- Multiple Choice Options -->
                    <div id="mc_options" class="bg-neo-blue border-2 border-black rounded p-5 shadow-neo-sm">
                        <h5 class="font-black mb-4">Multiple Choice Options</h5>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label for="option_a" class="block font-bold mb-1 text-sm">Option A</label>
                                <input type="text" class="neo-input bg-white py-2" id="option_a" name="option_a"
                                    placeholder="Option A">
                            </div>
                            <div>
                                <label for="option_b" class="block font-bold mb-1 text-sm">Option B</label>
                                <input type="text" class="neo-input bg-white py-2" id="option_b" name="option_b"
                                    placeholder="Option B">
                            </div>
                            <div>
                                <label for="option_c" class="block font-bold mb-1 text-sm">Option C</label>
                                <input type="text" class="neo-input bg-white py-2" id="option_c" name="option_c"
                                    placeholder="Option C">
                            </div>
                            <div>
                                <label for="option_d" class="block font-bold mb-1 text-sm">Option D</label>
                                <input type="text" class="neo-input bg-white py-2" id="option_d" name="option_d"
                                    placeholder="Option D">
                            </div>
                        </div>
                    </div>

                    <!-- Correct Answer -->
                    <div>
                        <label for="correct_answer" class="block font-bold mb-2 text-lg">Correct Answer <span
                                class="text-red-600">*</span></label>
                        <div id="correct_answer_mc">
                            <select class="neo-input bg-neo-yellow cursor-pointer text-lg" name="correct_answer"
                                id="correct_answer_select">
                                <option value="A">A</option>
                                <option value="B">B</option>
                                <option value="C">C</option>
                                <option value="D">D</option>
                            </select>
                        </div>
                        <div id="correct_answer_tf" style="display:none;">
                            <select class="neo-input bg-neo-orange cursor-pointer text-lg" name="correct_answer_tf"
                                id="correct_answer_tf_select">
                                <option value="A">True</option>
                                <option value="B">False</option>
                            </select>
                        </div>
                        <div id="correct_answer_fb" style="display:none;">
                            <input type="text" class="neo-input bg-white py-3 text-lg" name="correct_answer_fb"
                                id="correct_answer_fb_input" placeholder="Enter the correct answer text">
                        </div>
                    </div>

                    <!-- Points and Time -->
                    <div class="flex flex-col md:flex-row gap-6 mt-2">
                        <div class="w-full">
                            <label for="points" class="block font-bold mb-2">Points</label>
                            <input type="number" class="neo-input bg-gray-50" id="points" name="points" value="10"
                                min="1" max="100">
                        </div>
                        <div class="w-full">
                            <label for="time_limit" class="block font-bold mb-2">Time Limit (secs)</label>
                            <input type="number" class="neo-input bg-gray-50" id="time_limit" name="time_limit"
                                value="15" min="5" max="300">
                        </div>
                    </div>

                    <div class="flex justify-end mt-4">
                        <button type="submit"
                            class="neo-btn bg-black text-white px-8 py-4 text-xl hover:bg-gray-800">Add Question
                            ✨</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    function toggleOptions() {
        const type = document.getElementById('question_type').value;
        const mcOptions = document.getElementById('mc_options');
        const correctMC = document.getElementById('correct_answer_mc');
        const correctTF = document.getElementById('correct_answer_tf');
        const correctFB = document.getElementById('correct_answer_fb');
        const timeLimitInput = document.getElementById('time_limit');

        const selectTF = document.getElementById('correct_answer_tf_select');
        const inputFB = document.getElementById('correct_answer_fb_input');

        // Default time limits per question type
        const defaultTimes = { 'multiple_choice': 15, 'true_false': 10, 'fill_blank': 20 };

        // Disable all hidden inputs so they don't submit
        document.getElementById('correct_answer_select').disabled = true;
        if (selectTF) selectTF.disabled = true;
        if (inputFB) inputFB.disabled = true;

        // Reset names to ensure they don't interfere
        document.getElementById('correct_answer_select').name = 'correct_answer_select';
        if (selectTF) selectTF.name = 'correct_answer_tf';
        if (inputFB) inputFB.name = 'correct_answer_fb';

        // Update default time limit for the selected question type
        timeLimitInput.value = defaultTimes[type] || 15;

        if (type === 'multiple_choice') {
            mcOptions.style.display = 'block';
            correctMC.style.display = 'block';
            correctTF.style.display = 'none';
            correctFB.style.display = 'none';
            document.getElementById('correct_answer_select').disabled = false;
            document.getElementById('correct_answer_select').name = 'correct_answer';
        } else if (type === 'true_false') {
            mcOptions.style.display = 'none';
            correctMC.style.display = 'none';
            correctTF.style.display = 'block';
            correctFB.style.display = 'none';
            if (selectTF) {
                selectTF.disabled = false;
                selectTF.name = 'correct_answer';
            }
        } else {
            mcOptions.style.display = 'none';
            correctMC.style.display = 'none';
            correctTF.style.display = 'none';
            correctFB.style.display = 'block';
            if (inputFB) {
                inputFB.disabled = false;
                inputFB.name = 'correct_answer';
            }
        }
    }

    // Initialize on page load
    document.addEventListener('DOMContentLoaded', toggleOptions);
</script>
{% endblock %}
