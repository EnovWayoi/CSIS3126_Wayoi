{% extends "base.html" %}

{% block title %}Register - Quiz Platform{% endblock %}

{% block content %}
<div class="flex justify-center mt-12 mb-20 relative z-0">
    <div class="w-full max-w-md">
        <div class="bg-neo-pink neo-card p-8">
            <h2 class="text-3xl font-black text-center mb-6">Create Account</h2>

            <form method="POST" action="{{ url_for('register') }}" class="flex flex-col gap-5">
                <div>
                    <label for="username" class="block font-bold mb-2">Username</label>
                    <input type="text" class="neo-input bg-white" id="username" name="username" required minlength="3"
                        maxlength="50">
                    <div class="text-sm font-semibold mt-1 opacity-80">At least 3 characters</div>
                </div>

                <div>
                    <label for="email" class="block font-bold mb-2">Email</label>
                    <input type="email" class="neo-input bg-white" id="email" name="email" required maxlength="100">
                </div>

                <div>
                    <label for="password" class="block font-bold mb-2">Password</label>
                    <input type="password" class="neo-input bg-white" id="password" name="password" required
                        minlength="8">
                    <div class="text-sm font-semibold mt-1 opacity-80">At least 8 characters</div>
                </div>

                <div>
                    <label for="confirm_password" class="block font-bold mb-2">Confirm Password</label>
                    <input type="password" class="neo-input bg-white" id="confirm_password" name="confirm_password"
                        required>
                </div>

                <div class="mt-4">
                    <button type="submit" class="neo-btn bg-black text-white w-full py-3 text-lg hover:bg-gray-800">
                        Register
                    </button>
                </div>
            </form>

            <div class="text-center mt-6 font-semibold">
                <p>Already have an account? <a href="{{ url_for('login') }}"
                        class="text-blue-800 hover:underline decoration-2 underline-offset-4 font-bold">Login here</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
